<!doctype html>

    <link rel="stylesheet" href="./styles.css?v=17" />
    <style>
    /* Safari横线修复 */
    .intro-ring {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    .wash-layer {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      will-change: auto;
    }
    .intro-decoration {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    /* 修复Safari中可能由backdrop-filter产生的横线伪影 */
    .glass-button {
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    /* 确保圆环是正圆而非椭圆 */
    .intro-ring-one, .intro-ring-two, .intro-ring-three {
      aspect-ratio: 1 / 1;
      -webkit-aspect-ratio: 1 / 1;
    }
  </style>

            <button class="glass-button" type="button" aria-label="返回" id="resultTopBackButton">
              <img src="./assets/icon-arrow-left-center-m.svg" alt="" aria-hidden="true" />
            </button>
            <button class="glass-button" type="button" aria-label="声音">
              <img src="./assets/icon-sound-on-b.svg" alt="" aria-hidden="true" />
            </button>
          </div>
        </div>

          <div class="result-art">

          <p class="result-copy" id="resultCopy">
            你可能正在，一边往前走，一边舍不得回头看。这个选择像是在提醒你——你带着过去的某段路，才觉得踏实。
            你最近也许更需要，谢谢那段路，然后轻一点上车。 留着旧车票的人，多半重感情。它证明你真的去过、爱过、认真过。
          </p>
          <div class="actions">
